<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Family Branch</title>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <style>
        .branch-container { text-align: center; padding: 20px; }
        .parents-row, .children-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .link-line { height: 30px; border-left: 2px dashed #666; margin: 0 auto; }
        a.child-link { text-decoration: none; color: inherit; }
        a.child-link .person-card:hover { border-color: #007bff; transform: translateY(-2px); transition: 0.2s; }
        .sidebar-jump-menu { padding: 15px; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <h3 style="text-align: center; margin-top: 0;">Family Directory</h3>
        <a href="index.html">Back to Main Search</a>
        <a href="#" id="backButton">Go Up One Generation</a>

        <div class="sidebar-jump-menu">
            <label for="jumpSelect" style="font-size: 14px; display: block; margin-bottom: 5px;">Jump to Branch:</label>
            <select id="jumpSelect" placeholder="Search name..."></select>
            <button id="jumpBtn" style="margin-top: 10px; width: 100%;">Go</button>
        </div>

        <div class="sidebar-jump-menu" style="border-top: 1px solid #444; margin-top: 20px;">
            <label style="font-size: 14px; display: block; margin-bottom: 5px;">Highlight Ancestor:</label>
            <select id="highlightSelect" placeholder="Find ancestor..."></select>
        </div>
    </nav>
    
    <div class="main-content">
        <div class="branch-container">
            <h2>Parents</h2>
            <div id="parentsContainer" class="parents-row"></div>
            <div class="link-line"></div>
            <h2>Children</h2>
            <div id="childrenContainer" class="children-row"></div>
        </div>
    </div>

    <script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        onDataReady(() => {
            const params = new URLSearchParams(window.location.search);
            const currentUID = params.get('uid');
            const parentsContainer = document.getElementById('parentsContainer');
            const childrenDiv = document.getElementById('childrenContainer');
            const backBtn = document.getElementById('backButton');
            const jumpSelect = document.getElementById('jumpSelect');
            const highlightSelect = document.getElementById('highlightSelect');

            if (!parentsContainer || !jumpSelect || !highlightSelect) return;

            // 1. Setup TomSelect
            const tsOptions = { create: false, sortField: { field: "text", direction: "asc" }, maxItems: 1, persist: true };
            
            genealogyData.forEach(person => {
                jumpSelect.appendChild(new Option(person["Name Array"], person.IndividualUID));
                highlightSelect.appendChild(new Option(person["Name Array"], person.IndividualUID));
            });

            const jumpTS = new TomSelect("#jumpSelect", tsOptions);
            const highlightTS = new TomSelect("#highlightSelect", tsOptions);

            // 2. Define Highlight Helper
            function applyHighlight(targetUID) {
                document.querySelectorAll('.person-card').forEach(el => el.classList.remove('highlight-ancestor'));
                if (!targetUID) return;

                let currentPathUID = targetUID;
                let found = false;

                while (currentPathUID) {
                    const card = document.querySelector(`.person-card[data-uid="${currentPathUID}"]`);
                    if (card) {
                        card.classList.add('highlight-ancestor');
                        found = true;
                    }
                    const person = genealogyData.find(p => p.IndividualUID == currentPathUID);
                    currentPathUID = person ? person.ParentUID : null;
                    if (currentPathUID === currentUID) break;
                }
            }

            // 3. Highlight Change Event
            highlightTS.on('change', (val) => {
                sessionStorage.setItem('lastHighlightedUID', val || "");
                applyHighlight(val);
            });

            // 4. Render Branch Data
            if (currentUID) {
                const focusPerson = genealogyData.find(p => p.IndividualUID == currentUID);
                if (focusPerson) {
                    const partner = genealogyData.find(p => p.IndividualUID == focusPerson.PartnerUID);
                    parentsContainer.innerHTML = createCardHTML(focusPerson) + (partner ? createCardHTML(partner) : "");

                    const children = genealogyData.filter(p => 
                        p.ParentUID == focusPerson.IndividualUID || 
                        (partner && p.ParentUID == partner.IndividualUID)
                    );
                    childrenDiv.innerHTML = children.length > 0 
                        ? children.map(c => `<a href="family-branch.html?uid=${c.IndividualUID}" class="child-link">${createCardHTML(c)}</a>`).join('')
                        : "<p>No children on record.</p>";

                    if (focusPerson.ParentUID) backBtn.href = `family-branch.html?uid=${focusPerson.ParentUID}`;
                    else backBtn.style.display = "none";
                }
            }

            // 5. Restore saved highlight after rendering cards
            const savedHighlight = sessionStorage.getItem('lastHighlightedUID');
            if (savedHighlight) {
                highlightTS.setValue(savedHighlight);
                applyHighlight(savedHighlight);
            }

            // Jump Button Logic
            document.getElementById('jumpBtn').addEventListener('click', () => {
                const val = jumpTS.getValue();
                if (val) window.location.href = `family-branch.html?uid=${val}`;
            });
        });
    });

    function createCardHTML(person) {
        return `
            <div class="person-card" data-uid="${person.IndividualUID}">
                <h4>${person["Name Array"]}</h4>
                <p><small>${person["Notes"] || "Member"}</small></p>
                <p><small>Born: ${person["Born"] || "unknown"}</small></p>
                <p><small>Died: ${person["Died"] || "unknown"}</small></p>
            </div>
        `;
    }
</script>
</body>
</html>
