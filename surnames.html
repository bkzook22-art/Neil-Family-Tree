<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Surname Index</title>
</head>
<body>
    <nav><a href="index.html">Back to Main</a></nav>
    <h2>Family Surnames</h2>
    <div id="surnameList"></div>

    <!-- Inside surnames.html -->
<script src="script.js"></script>
<script>
    onDataReady(() => {
        // 1. Get unique last names
        // Added a filter to remove empty/null names in case your data has blanks
        const surnames = [...new Set(genealogyData
            .map(p => p["Last Name"])
            .filter(name => name) // Removes undefined/null/empty strings
        )].sort();
        
        const container = document.getElementById('surnameList');
        
        // 2. Generate links
        surnames.forEach(name => {
            const a = document.createElement('a');
            a.textContent = name;
            a.href = `family.html?surname=${encodeURIComponent(name)}`;
            a.style.display = "block";
            a.style.marginBottom = "5px"; // Added spacing for readability
            container.appendChild(a);
        });
    });
</script>
</body>
</html>
