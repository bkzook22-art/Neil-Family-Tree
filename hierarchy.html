<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Family Hierarchy</title>
</head>
<body>
    <nav><a href="index.html">Back to Main</a></nav>
    <h2>Family Tree by Generation</h2>
    <div id="hierarchyContainer"></div>

   <script src="script.js"></script>
<script>
    onDataReady(() => {
        const container = document.getElementById('hierarchyContainer');
        container.innerHTML = "";

        // 1. Group by Generation first
        const byGen = {};
        genealogyData.forEach(person => {
            const gen = getGeneration(person, genealogyData);
            if (!byGen[gen]) byGen[gen] = [];
            byGen[gen].push(person);
        });

        // 2. Render each generation
        Object.keys(byGen).sort((a, b) => a - b).forEach(gen => {
            const section = document.createElement('section');
            section.innerHTML = `<h3 style="text-align:center;">GENERATION ${gen}</h3>`;
            
            // 3. Sub-group by Parent (Family Units)
            const families = {};
            byGen[gen].forEach(person => {
                const pId = person.ParentUID || "Unknown";
                if (!families[pId]) families[pId] = [];
                families[pId].push(person);
            });

            // 4. Render families as distinct blocks
            Object.keys(families).forEach(pId => {
                const familyWrapper = document.createElement('div');
                familyWrapper.className = "generation-wrapper";
                familyWrapper.style.border = "1px solid #444"; // Visual separator for families
                familyWrapper.style.margin = "10px";
                
                families[pId].forEach(person => {
                    const card = document.createElement('div');
                    card.className = "person-card";
                    card.innerHTML = `
                        <h4>${person["Name Array"]}</h4>
                        <p><small>${person["Notes"] || "Member"}</small></p>
                        <p><small>Born: ${person["Born"] || "Unknown"}</small></p>
                        <p><small>Died: ${person["Died"] || "Unknown"}</small></p>
                    `;
                    familyWrapper.appendChild(card);
                });
                section.appendChild(familyWrapper);
            });

            container.appendChild(section);
        });
    });
</script>
</body>
</html>
